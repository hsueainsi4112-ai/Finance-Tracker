<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Finance Tracker</title>
  <link rel="stylesheet" href="css/signup.css">
</head>
<body>
  <div class="signup-container">
    <!-- Left Illustration -->
    <div class="signup-image">
      <img src="images/signup.png" alt="Finance Tracker Illustration">
    </div>

    <!-- Right Form -->
    <div class="signup-form">
      <h2>Create Account</h2>
      <p class="subtitle">Join Finance Tracker and start managing your money smarter</p>

      <form onsubmit="registerUser(event)">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@mail.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required>

        <label for="confirm">Repeat your password</label>
        <input type="password" id="confirm" placeholder="Re-enter password" required>

        <div class="terms">
          <input type="checkbox" id="agree" required>
          <label for="agree">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit" class="signup-btn">Continue</button>

        <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
      </form>
    </div>
  </div>
  <script src="js/signup.js"></script>
</body>
</html>
